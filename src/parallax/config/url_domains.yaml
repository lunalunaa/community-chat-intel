# URL classification domains for analyze.py classify_url()
#
# Domain patterns used to classify URLs found in messages into categories.
# Each entry is a substring match against the URL domain (case-insensitive).
# The first matching category wins.
#
# impersonator and official domains come from keywords.py (IMPERSONATOR_DOMAINS
# and OFFICIAL_DOMAINS) — edit those lists there. This file covers the
# remaining categories.

hf:
  - "huggingface.co"

modelscope:
  - "modelscope"

